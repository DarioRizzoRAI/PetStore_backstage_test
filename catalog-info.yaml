apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: petstore
  description: Demo PetStore - sistema e-commerce per animali domestici basato su Swagger PetStore
  tags:
    - demo
    - poc
spec:
  owner: team-backend
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: petstore-pet-api
  description: Microservizio REST per la gestione degli animali (Pet)
  tags:
    - csharp
    - dotnet
    - rest
    - backend
  annotations:
    github.com/project-slug: DarioRizzoRAI/PetStore_backstage_test
    backstage.io/techdocs-ref: dir:.
  links:
    - url: https://github.com/DarioRizzoRAI/PetStore_backstage_test/tree/master/PetStore.Pet.Api
      title: Codice sorgente
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: team-backend
  system: petstore
  providesApis:
    - pet-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: petstore-store-api
  description: Microservizio REST per la gestione degli ordini e dello store
  tags:
    - csharp
    - dotnet
    - rest
    - backend
  annotations:
    github.com/project-slug: DarioRizzoRAI/PetStore_backstage_test
  links:
    - url: https://github.com/DarioRizzoRAI/PetStore_backstage_test/tree/master/PetStore.Store.Api
      title: Codice sorgente
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: team-backend
  system: petstore
  providesApis:
    - store-api
  consumesApis:
    - pet-api
---
